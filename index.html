<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you, Geia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
    <script src="script.js"></script>
  </head>
  <body>
    <button class="back-btn" onclick="goBack()">
      <- Back
    </button>
    <div class="container">
      <div class="header">
        <h3><i>This is exclusively for you!</i></h3>
      </div>
      <div class="trigger" onclick="openEnvelope()">
        <span class="small-heart">❤️</span>
        <p class="click-text">hint: open my heart</p>
      </div>
      <div class="envelope" id="envelope">
        <div class="letter">
          <p id="poem"></p>
          <div class="inside-photo">
            <img src="./download" alt="Her Photo">
          </div>
        </div>
      </div>
    </div>
    <audio id="bg-music" loop>
      <source src="./Miguel.mp3" type="audio/mpeg">
    </audio>
  </body>
</html>
