<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you, Geia</title>
    <link rel="stylesheet" href="./CSS/letter.css">
    <link rel="icon" href="./assets/img/icon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet">
    <script src="./JavaScript/letter.js"></script>
  </head>
  <body>
    <button class="back-btn" onclick="goBack()">
      <- Back
    </button>
    <div class="container">
      <div class="header">
        <h3>This is exclusively for you!</h3>
      </div>
      <div class="trigger" onclick="openEnvelope()">
        <span class="small-heart">❤️</span>
        <p class="click-text">hint: open my heart</p>
      </div>
      <div class="envelope" id="envelope">
        <div class="letter">
          <div class="inside-photo">
            <img src="./assets/img/download.jpg" alt="Her Photo">
          </div>
          <p id="poem"></p>
        </div>
      </div>
    </div>
    <audio id="bg-music" loop>
      <source src="./assets/audio/Miguel.mp3" type="audio/mpeg">
    </audio>
  </body>
</html>
